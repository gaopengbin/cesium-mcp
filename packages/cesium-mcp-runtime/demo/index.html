<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cesium MCP Runtime — Demo Test Page</title>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>
<script src="../../cesium-mcp-bridge/dist/cesium-mcp-bridge.browser.global.js?v=9"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e17; color: #e0e0e0; display: flex; height: 100vh; }

  /* 左侧地图区 */
  .map-area { flex: 1; min-width: 0; position: relative; }
  #cesiumContainer { width: 100%; height: 100%; }
  .cesium-viewer-bottom, .cesium-viewer-animationContainer,
  .cesium-viewer-timelineContainer, .cesium-viewer-fullscreenContainer { display: none !important; }

  /* 地图覆盖层 */
  .map-overlay { position: absolute; bottom: 8px; left: 8px; display: flex; gap: 8px; z-index: 10; pointer-events: none; }
  .coord-bar { background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 4px; font-size: 11px; color: #94a3b8; font-family: monospace; pointer-events: auto; }

  /* 拖放覆盖层 */
  .drop-overlay { position: absolute; inset: 0; background: rgba(37,99,235,0.15); border: 3px dashed #60a5fa; display: none; z-index: 20;
    align-items: center; justify-content: center; font-size: 20px; color: #60a5fa; font-weight: 600; backdrop-filter: blur(2px); }
  .drop-overlay.active { display: flex; }

  /* 截图预览 */
  .screenshot-preview { position: absolute; top: 12px; right: 12px; max-width: 280px; background: #111827; border: 1px solid #334155;
    border-radius: 8px; overflow: hidden; z-index: 15; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; }
  .screenshot-preview img { width: 100%; display: block; }
  .screenshot-preview .ss-bar { display: flex; justify-content: space-between; padding: 6px 10px; font-size: 11px; }
  .screenshot-preview .ss-bar button { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 11px; }
  .screenshot-preview .ss-bar button:hover { color: #60a5fa; }

  /* 右侧面板 */
  .panel { width: 440px; display: flex; flex-direction: column; background: #111827; border-left: 1px solid #1e293b; overflow: hidden; }
  .panel-header { padding: 14px 16px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; justify-content: space-between; }
  .panel-header h1 { font-size: 15px; font-weight: 600; color: #60a5fa; }
  .panel-header .ver { font-size: 11px; color: #4b5563; }

  /* 面板滚动区 */
  .panel-scroll { flex: 1; overflow-y: auto; }

  /* 通用 section */
  .section { padding: 10px 16px; border-bottom: 1px solid #1e293b; }
  .section h3 { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .section h3 button { background: none; border: none; color: #6b7280; font-size: 11px; cursor: pointer; }
  .section h3 button:hover { color: #ef4444; }

  /* 连接状态 */
  .conn-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .conn-input { display: flex; gap: 6px; margin-top: 6px; }
  .conn-input input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #e0e0e0; padding: 4px 8px; font-size: 12px; font-family: monospace; }
  .btn { border: none; border-radius: 4px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.12s; }
  .btn-blue { background: #2563eb; color: white; }
  .btn-blue:hover { background: #1d4ed8; }
  .btn-green { background: #059669; color: white; }
  .btn-green:hover { background: #047857; }
  .btn-red { background: #dc2626; color: white; }
  .btn-red:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: #6b7280; border: 1px solid #334155; }
  .btn-ghost:hover { color: #e0e0e0; border-color: #60a5fa; }
  .api-status { margin-top: 6px; font-size: 11px; color: #4b5563; font-family: monospace; }

  /* 快速操作 */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .action-btn { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 7px 10px; color: #d1d5db; font-size: 12px; cursor: pointer; text-align: left; transition: all 0.12s; }
  .action-btn:hover { background: #334155; border-color: #60a5fa; color: #60a5fa; }

  /* 手动命令 */
  .cmd-row { display: flex; gap: 6px; }
  .cmd-row select { width: 150px; background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #e0e0e0; padding: 4px 8px; font-size: 12px; }
  .cmd-textarea { width: 100%; background: #0d1117; border: 1px solid #334155; border-radius: 4px; color: #e0e0e0; padding: 6px 8px;
    font-size: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace; resize: vertical; min-height: 52px; margin-top: 6px; line-height: 1.4; }
  .cmd-btns { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }

  /* 日志 */
  .log-list { max-height: 300px; overflow-y: auto; }
  .log-item { padding: 6px 8px; margin-bottom: 3px; border-radius: 5px; font-size: 11px; font-family: 'Cascadia Code', 'Fira Code', monospace; line-height: 1.4; word-break: break-all; }
  .log-item.recv { background: #0c2d1f; border-left: 3px solid #22c55e; }
  .log-item.sent { background: #1e1b30; border-left: 3px solid #8b5cf6; }
  .log-item.error { background: #2d0c0c; border-left: 3px solid #ef4444; }
  .log-item.info { background: #0c1d2d; border-left: 3px solid #3b82f6; }
  .log-time { color: #6b7280; margin-right: 4px; }
</style>
</head>
<body>

<!-- 地图区 -->
<div class="map-area">
  <div id="cesiumContainer"></div>
  <div class="map-overlay">
    <div class="coord-bar" id="coordBar">---, ---</div>
  </div>
  <div class="drop-overlay" id="dropOverlay">拖放 GeoJSON 文件到此处加载</div>
  <div class="screenshot-preview" id="ssPreview">
    <img id="ssImg" />
    <div class="ss-bar">
      <span>截图预览</span>
      <div>
        <button onclick="downloadScreenshot()">下载</button>
        <button onclick="document.getElementById('ssPreview').style.display='none'">关闭</button>
      </div>
    </div>
  </div>
</div>

<!-- 右侧面板 -->
<div class="panel">
  <div class="panel-header">
    <h1>Cesium MCP Runtime</h1>
    <span class="ver">v0.1.0 | Cesium 1.139</span>
  </div>
  <div class="panel-scroll">

    <!-- 连接 -->
    <div class="section">
      <h3>WebSocket 连接 <button onclick="checkApiStatus()">查看状态</button></h3>
      <div class="conn-row">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">未连接</span>
      </div>
      <div class="conn-input">
        <input id="wsUrl" value="ws://localhost:9100?session=demo" />
        <button class="btn btn-blue" id="connBtn" onclick="toggleConnection()">连接</button>
      </div>
      <div class="api-status" id="apiStatus"></div>
    </div>

    <!-- 快速测试 -->
    <div class="section">
      <h3>快速测试</h3>
      <div class="action-grid">
        <button class="action-btn" onclick="quickTest('flyTo')">✈ 飞到北京</button>
        <button class="action-btn" onclick="quickTest('flyToShanghai')">✈ 飞到上海</button>
        <button class="action-btn" onclick="quickTest('addGeoJson')">📍 加载 GeoJSON</button>
        <button class="action-btn" onclick="quickTest('addLabel')">🏷 添加标注</button>
        <button class="action-btn" onclick="quickTest('setBasemap')">🗺 切换底图</button>
        <button class="action-btn" onclick="quickTest('screenshot')">📷 截图</button>
        <button class="action-btn" onclick="quickTest('removeAll')">🗑 清除全部</button>
        <button class="action-btn" onclick="quickTest('httpPost')">📡 HTTP 推送</button>
      </div>
    </div>

    <!-- 手动命令 -->
    <div class="section">
      <h3>手动命令</h3>
      <div class="cmd-row">
        <select id="cmdAction" onchange="onActionChange()">
          <optgroup label="Camera">
            <option value="flyTo">flyTo</option>
            <option value="setView">setView</option>
            <option value="getView">getView</option>
            <option value="zoomToExtent">zoomToExtent</option>
          </optgroup>
          <optgroup label="Entity">
            <option value="addMarker">addMarker</option>
            <option value="addPolyline">addPolyline</option>
            <option value="addPolygon">addPolygon</option>
            <option value="addModel">addModel</option>
            <option value="updateEntity">updateEntity</option>
            <option value="removeEntity">removeEntity</option>
          </optgroup>
          <optgroup label="Layer">
            <option value="addGeoJsonLayer">addGeoJsonLayer</option>
            <option value="addLabel">addLabel</option>
            <option value="addHeatmap">addHeatmap</option>
            <option value="removeLayer">removeLayer</option>
            <option value="setLayerVisibility">setLayerVisibility</option>
            <option value="listLayers">listLayers</option>
            <option value="updateLayerStyle">updateLayerStyle</option>
          </optgroup>
          <optgroup label="Scene">
            <option value="setBasemap">setBasemap</option>
            <option value="load3dTiles">load3dTiles</option>
            <option value="loadTerrain">loadTerrain</option>
            <option value="loadImageryService">loadImageryService</option>
          </optgroup>
          <optgroup label="Interaction">
            <option value="screenshot">screenshot</option>
            <option value="highlight">highlight</option>
            <option value="playTrajectory">playTrajectory</option>
          </optgroup>
        </select>
        <button class="btn btn-ghost" onclick="fillTemplate()">填充模板</button>
      </div>
      <textarea class="cmd-textarea" id="cmdParams" spellcheck="false">{"longitude": 116.397, "latitude": 39.908, "height": 15000}</textarea>
      <div class="cmd-btns">
        <button class="btn btn-green" onclick="sendManualCmd()">本地执行</button>
        <button class="btn btn-blue" onclick="sendViaHttp()">HTTP 推送</button>
      </div>
    </div>

    <!-- 日志 -->
    <div class="section">
      <h3>命令日志 <button onclick="clearLogs()">清空</button></h3>
      <div class="log-list" id="logList"></div>
    </div>

  </div>
</div>

<script>
// ==================== 工具参数模板 ====================
const TEMPLATES = {
  flyTo: { longitude: 116.397, latitude: 39.908, height: 15000, pitch: -30, duration: 2 },
  setView: { longitude: 116.397, latitude: 39.908, height: 50000, pitch: -90 },
  getView: {},
  zoomToExtent: { west: 73, south: 3, east: 135, north: 53, duration: 2 },
  addMarker: { longitude: 116.397, latitude: 39.908, label: '天安门', color: '#3B82F6', size: 14 },
  addPolyline: { coordinates: [[116.39, 39.9], [121.47, 31.23]], color: '#FF4444', width: 4, label: '北京-上海' },
  addPolygon: { coordinates: [[116.3, 39.85], [116.5, 39.85], [116.5, 39.95], [116.3, 39.95]], color: '#3B82F6', opacity: 0.5, label: '区域' },
  addModel: { longitude: 116.397, latitude: 39.908, height: 0, url: 'https://example.com/model.glb', scale: 1 },
  updateEntity: { entityId: '', label: '已更新', color: '#00FF00' },
  removeEntity: { entityId: '' },
  addGeoJsonLayer: {
    id: 'layer_demo', name: '示例图层',
    data: { type: 'FeatureCollection', features: [
      { type: 'Feature', geometry: { type: 'Point', coordinates: [116.397, 39.908] }, properties: { name: '天安门' } },
      { type: 'Feature', geometry: { type: 'Point', coordinates: [116.407, 39.904] }, properties: { name: '王府井' } },
      { type: 'Feature', geometry: { type: 'Point', coordinates: [116.384, 39.917] }, properties: { name: '北海公园' } },
    ]},
    style: { strokeColor: '#3388ff', fillColor: '#3388ff', fillOpacity: 0.3, strokeWidth: 2 },
  },
  addLabel: {
    field: 'name',
    data: { type: 'FeatureCollection', features: [
      { type: 'Feature', geometry: { type: 'Point', coordinates: [116.397, 39.908] }, properties: { name: '天安门' } },
      { type: 'Feature', geometry: { type: 'Point', coordinates: [116.407, 39.904] }, properties: { name: '王府井' } },
    ]},
  },
  addHeatmap: { data: { type: 'FeatureCollection', features: [] }, radius: 25 },
  removeLayer: { id: 'layer_demo' },
  setLayerVisibility: { id: 'layer_demo', visible: false },
  listLayers: {},
  updateLayerStyle: { layerId: 'layer_demo', layerStyle: { color: '#FF0000', opacity: 0.5 } },
  setBasemap: { basemap: 'satellite' },
  load3dTiles: { url: 'https://example.com/tileset.json' },
  loadTerrain: { provider: 'arcgis' },
  loadImageryService: { url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', serviceType: 'xyz' },
  screenshot: {},
  highlight: { layerId: 'layer_demo', featureId: 0, color: '#ff0000' },
  playTrajectory: { coordinates: [[116.39, 39.9], [117.2, 39.1], [118.8, 32.1], [121.47, 31.23]], durationSeconds: 10, label: '轨迹' },
}

// ==================== Cesium 初始化 ====================
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc5YzciLCJpZCI6NTc3MzMsImlhdCI6MTYyMjY0NDE0OH0.XcKpgAjDwlOntSHtGydTVfDEF39UOlSP_LpPiaUL0Zg'

const viewer = new Cesium.Viewer('cesiumContainer', {
  baseLayer: false,
  baseLayerPicker: false, geocoder: false, homeButton: false,
  sceneModePicker: false, navigationHelpButton: false,
  animation: false, timeline: false, fullscreenButton: false,
  infoBox: false, selectionIndicator: false,
})
viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0B1120')
viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#0B1120')
viewer.imageryLayers.add(new Cesium.ImageryLayer(
  new Cesium.UrlTemplateImageryProvider({ url: 'https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', maximumLevel: 18 })
))
viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(104, 35, 6000000), duration: 0 })

const layerMap = new Map()
let currentBasemap = 'dark'

// ==================== CesiumBridge 实例 ====================
const bridge = new CesiumMcpBridge.CesiumBridge(viewer)

// ==================== 鼠标坐标显示 ====================
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas)
handler.setInputAction((movement) => {
  const cartesian = viewer.camera.pickEllipsoid(movement.endPosition, viewer.scene.globe.ellipsoid)
  if (cartesian) {
    const carto = Cesium.Cartographic.fromCartesian(cartesian)
    const lon = Cesium.Math.toDegrees(carto.longitude).toFixed(4)
    const lat = Cesium.Math.toDegrees(carto.latitude).toFixed(4)
    document.getElementById('coordBar').textContent = `${lon}°E, ${lat}°N`
  }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE)

// ==================== 文件拖放 ====================
const mapArea = document.querySelector('.map-area')
const dropOverlay = document.getElementById('dropOverlay')
let dragCounter = 0

mapArea.addEventListener('dragenter', (e) => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active') })
mapArea.addEventListener('dragleave', () => { if (--dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active') } })
mapArea.addEventListener('dragover', (e) => e.preventDefault())
mapArea.addEventListener('drop', (e) => {
  e.preventDefault(); dragCounter = 0; dropOverlay.classList.remove('active')
  const file = e.dataTransfer?.files?.[0]
  if (!file) return
  if (!file.name.match(/\.(geojson|json)$/i)) { addLog('error', `不支持的文件类型: ${file.name}`); return }
  const reader = new FileReader()
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result)
      const id = 'file_' + Date.now()
      addLog('info', `加载文件: ${file.name} (${(file.size / 1024).toFixed(1)}KB)`)
      executeAndLog('addGeoJsonLayer', { id, name: file.name.replace(/\.\w+$/, ''), data })
    } catch (err) { addLog('error', `JSON 解析失败: ${err.message}`) }
  }
  reader.readAsText(file)
})

// ==================== WebSocket ====================
let ws = null
let reconnectTimer = null

function updateStatus(state) {
  const dot = document.getElementById('statusDot')
  const text = document.getElementById('statusText')
  const btn = document.getElementById('connBtn')
  dot.className = 'status-dot ' + state
  text.textContent = state === 'connected' ? '已连接' : state === 'connecting' ? '连接中...' : '未连接'
  btn.textContent = (state === 'connected') ? '断开' : '连接'
  btn.className = (state === 'connected') ? 'btn btn-red' : 'btn btn-blue'
}

function toggleConnection() {
  if (ws && ws.readyState <= WebSocket.OPEN) {
    ws.onclose = null
    ws.close()
    ws = null
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
    updateStatus('disconnected')
    addLog('info', '手动断开')
    return
  }
  connect()
}

function connect() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
  const url = document.getElementById('wsUrl').value
  updateStatus('connecting')
  addLog('info', `连接 ${url}`)
  ws = new WebSocket(url)
  ws.onopen = () => { updateStatus('connected'); addLog('info', 'WebSocket 已连接') }
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data)
      if (msg.method) {
        addLog('recv', `<b>${msg.method}</b> — ${JSON.stringify(msg.params ?? {}).slice(0, 100)}`)
        executeCommand(msg.method, msg.params ?? {}).then(result => {
          if (msg.id) {
            ws.send(JSON.stringify({ id: msg.id, result }))
            addLog('sent', `响应 #${msg.id} — ${JSON.stringify(result).slice(0, 80)}`)
          }
        }).catch(err => {
          if (msg.id) ws.send(JSON.stringify({ id: msg.id, error: { message: err.message } }))
          addLog('error', `${msg.method} 失败: ${err.message}`)
        })
      }
    } catch (e) { addLog('error', '消息解析失败: ' + e.message) }
  }
  ws.onclose = () => {
    updateStatus('disconnected')
    addLog('info', '连接断开，3s 后重连...')
    reconnectTimer = setTimeout(connect, 3000)
  }
  ws.onerror = () => {}
}

// ==================== API 状态查询 ====================
async function checkApiStatus() {
  const baseUrl = getHttpBaseUrl()
  try {
    const resp = await fetch(baseUrl + '/api/status')
    const data = await resp.json()
    document.getElementById('apiStatus').textContent =
      `sessions: [${data.sessions?.join(', ') || '无'}]  connections: ${data.connections ?? 0}`
    addLog('info', `API 状态: ${JSON.stringify(data)}`)
  } catch (e) {
    document.getElementById('apiStatus').textContent = '无法连接 runtime'
    addLog('error', `API 状态查询失败: ${e.message}`)
  }
}

// ==================== 命令执行（委托给 CesiumBridge） ====================
async function executeCommand(action, params) {
  return bridge.execute({ action, params })
}

function downloadScreenshot() {
  const a = document.createElement('a')
  a.href = document.getElementById('ssImg').src
  a.download = `cesium_screenshot_${Date.now()}.png`
  a.click()
}

// ==================== 快速测试 ====================
function quickTest(name) {
  const actions = {
    flyTo: () => executeAndLog('flyTo', { longitude: 116.397, latitude: 39.908, height: 15000, pitch: -30 }),
    flyToShanghai: () => executeAndLog('flyTo', { longitude: 121.4737, latitude: 31.2304, height: 20000, pitch: -40 }),
    addGeoJson: () => executeAndLog('addGeoJsonLayer', TEMPLATES.addGeoJsonLayer),
    addLabel: () => executeAndLog('addLabel', TEMPLATES.addLabel),
    setBasemap: () => {
      const basemaps = ['dark', 'satellite', 'standard']
      const idx = (basemaps.indexOf(currentBasemap) + 1) % basemaps.length
      executeAndLog('setBasemap', { basemap: basemaps[idx] })
    },
    screenshot: () => executeAndLog('screenshot', {}),
    removeAll: () => {
      for (const [id] of layerMap) executeAndLog('removeLayer', { id })
      viewer.entities.removeAll()
      addLog('info', '已清除所有图层和实体')
    },
    httpPost: () => testHttpPost(),
  }
  actions[name]?.()
}

async function executeAndLog(action, params) {
  addLog('info', `本地执行: <b>${action}</b>`)
  try {
    const result = await executeCommand(action, params)
    const display = { ...result }; delete display.dataUrl
    addLog('sent', `结果: ${JSON.stringify(display).slice(0, 120)}`)
    return result
  } catch (e) {
    addLog('error', `失败: ${e.message}`)
    return { success: false, error: e.message }
  }
}

// ==================== HTTP 推送 ====================
function getHttpBaseUrl() {
  return document.getElementById('wsUrl').value.replace('ws://', 'http://').replace('wss://', 'https://').replace(/\?.*/, '')
}

async function testHttpPost() {
  const url = getHttpBaseUrl() + '/api/command'
  addLog('info', `HTTP POST → ${url}`)
  try {
    const resp = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: 'demo', command: { action: 'flyTo', params: { longitude: 121.47, latitude: 31.23, height: 20000 } } }),
    })
    const data = await resp.json()
    addLog('recv', `HTTP 响应: ${JSON.stringify(data)}`)
  } catch (e) { addLog('error', `HTTP 失败: ${e.message}`) }
}

async function sendViaHttp() {
  const action = document.getElementById('cmdAction').value
  let params = {}
  try { params = JSON.parse(document.getElementById('cmdParams').value || '{}') } catch {}
  const url = getHttpBaseUrl() + '/api/command'
  addLog('info', `HTTP POST → ${url} (${action})`)
  try {
    const resp = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: 'demo', command: { action, params } }),
    })
    const data = await resp.json()
    addLog('recv', `HTTP 响应: ${JSON.stringify(data)}`)
  } catch (e) { addLog('error', `HTTP 失败: ${e.message}`) }
}

// ==================== 手动命令 ====================
function onActionChange() {
  const action = document.getElementById('cmdAction').value
  const tpl = TEMPLATES[action]
  if (tpl) document.getElementById('cmdParams').value = JSON.stringify(tpl, null, 2)
}

function fillTemplate() { onActionChange() }

function sendManualCmd() {
  const action = document.getElementById('cmdAction').value
  let params = {}
  try { params = JSON.parse(document.getElementById('cmdParams').value || '{}') } catch (e) { addLog('error', `JSON 格式错误: ${e.message}`); return }
  executeAndLog(action, params)
}

// ==================== 日志 ====================
function addLog(type, text) {
  const list = document.getElementById('logList')
  const time = new Date().toLocaleTimeString('zh-CN', { hour12: false })
  const item = document.createElement('div')
  item.className = 'log-item ' + type
  item.innerHTML = `<span class="log-time">${time}</span> ${text}`
  list.appendChild(item)
  list.scrollTop = list.scrollHeight
  if (list.children.length > 200) list.removeChild(list.firstChild)
}

function clearLogs() { document.getElementById('logList').innerHTML = '' }

// ==================== 键盘快捷键 ====================
document.getElementById('cmdParams').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) { sendManualCmd(); e.preventDefault() }
})

addLog('info', 'Demo 就绪 — 点击「连接」或拖放 GeoJSON 文件到地图区域')
addLog('info', '手动命令: 选择 action → 填充模板 → Ctrl+Enter 执行')
</script>
