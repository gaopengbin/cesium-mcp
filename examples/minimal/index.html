<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Cesium MCP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.139/Build/Cesium/Cesium.js"></script>
  <style>
    :root {
      --bg: #09090b; --bg-card: #18181b; --bg-popover: #27272a;
      --border: #27272a; --border-hover: #3f3f46;
      --fg: #fafafa; --fg-muted: #a1a1aa; --fg-dim: #71717a;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --success: #22c55e; --danger: #ef4444; --warning: #eab308;
      --radius: 8px; --radius-sm: 6px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); overflow: hidden; }

    /* Cesium overrides */
    #cesiumContainer { width: 100%; height: 100%; }
    .cesium-viewer-bottom, .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer, .cesium-viewer-fullscreenContainer { display: none !important; }

    /* Panel */
    .panel { width: 420px; display: flex; flex-direction: column; background: var(--bg); border-left: 1px solid var(--border); }
    .panel-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .panel-header h1 span { color: var(--fg-dim); font-weight: 400; margin-left: 6px; font-size: 12px; }
    .panel-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .panel-scroll::-webkit-scrollbar { width: 4px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px;
      border: 1px solid transparent;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .badge.ok { background: #052e16; color: #4ade80; border-color: #14532d; }
    .badge.ok::before { background: #4ade80; }
    .badge.err { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }
    .badge.err::before { background: #fca5a5; }

    /* Section */
    .section { border-bottom: 1px solid var(--border); }
    .section-title {
      padding: 12px 20px; font-size: 12px; font-weight: 500; color: var(--fg-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      user-select: none; transition: color 0.15s;
      letter-spacing: 0.02em;
    }
    .section-title:hover { color: var(--fg); }
    .section-title .arrow { font-size: 10px; transition: transform 0.2s ease; color: var(--fg-dim); }
    .section.collapsed .section-body { display: none; }
    .section.collapsed .arrow { transform: rotate(-90deg); }
    .section-body { padding: 4px 20px 16px; }

    /* Button */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 6px 14px; font-size: 12px; font-weight: 500; font-family: inherit;
      background: var(--bg-card); color: var(--fg-muted); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s ease;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-popover); color: var(--fg); border-color: var(--border-hover); }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn.destructive { color: var(--danger); border-color: #7f1d1d40; }
    .btn.destructive:hover { background: #450a0a; border-color: #7f1d1d; }
    .btn-grid { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Log */
    #log {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; font-size: 11px; font-family: 'JetBrains Mono', monospace;
      max-height: 220px; overflow-y: auto; line-height: 1.7;
    }
    .log-time { color: var(--fg-dim); }
    .log-cmd { color: var(--accent); }
    .log-ok { color: var(--success); }
    .log-err { color: var(--danger); }
    .log-info { color: var(--fg-muted); }

    /* Screenshot preview */
    #screenshotPreview {
      display: none; position: absolute; top: 16px; right: 436px;
      width: 280px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; z-index: 100;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    #screenshotPreview img { width: 100%; display: block; }
    #screenshotPreview .bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; font-size: 11px; color: var(--fg-dim); border-top: 1px solid var(--border);
    }
    #screenshotPreview .bar button {
      background: none; border: none; color: var(--fg-dim); cursor: pointer;
      font-size: 11px; font-family: inherit; padding: 2px 6px; border-radius: 4px;
    }
    #screenshotPreview .bar button:hover { color: var(--fg); background: var(--bg-popover); }

    /* Coord bar */
    .coord-bar {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(9,9,11,0.8); backdrop-filter: blur(8px);
      padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      font-size: 11px; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace;
      z-index: 10;
    }

    /* Layer list */
    .layer-item {
      display: flex; align-items: center; gap: 10px; padding: 6px 0;
      font-size: 12px; border-bottom: 1px solid var(--border);
    }
    .layer-item:last-child { border-bottom: none; }
    .layer-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .layer-item .layer-type { font-size: 10px; color: var(--fg-dim); background: var(--bg-card); padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); }

    /* Textarea */
    .custom-textarea {
      width: 100%; height: 72px; background: var(--bg-card); color: var(--fg);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 12px; font-size: 11px; font-family: 'JetBrains Mono', monospace;
      resize: vertical; outline: none; transition: border-color 0.15s;
    }
    .custom-textarea:focus { border-color: var(--accent); }

    /* Hint text */
    .hint { font-size: 11px; color: var(--fg-dim); margin-top: 8px; }

    /* Light theme */
    :root[data-theme="light"] {
      --bg: #ffffff; --bg-card: #f4f4f5; --bg-popover: #e4e4e7;
      --border: #e4e4e7; --border-hover: #d4d4d8;
      --fg: #09090b; --fg-muted: #52525b; --fg-dim: #71717a;
      --accent: #2563eb; --accent-hover: #1d4ed8;
      --success: #16a34a; --danger: #dc2626; --warning: #ca8a04;
    }
    [data-theme="light"] .badge.ok { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    [data-theme="light"] .badge.ok::before { background: #22c55e; }
    [data-theme="light"] .badge.err { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    [data-theme="light"] .badge.err::before { background: #ef4444; }
    [data-theme="light"] .coord-bar { background: rgba(255,255,255,0.85); }
    [data-theme="light"] #screenshotPreview { box-shadow: 0 16px 48px rgba(0,0,0,0.15); }

    /* Toggle group */
    .header-actions { display: flex; align-items: center; gap: 6px; }
    .toggle-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer;
      background: none; border: 1px solid var(--border); color: var(--fg-dim);
      font-size: 14px; transition: all 0.15s;
    }
    .toggle-btn:hover { color: var(--fg); border-color: var(--border-hover); background: var(--bg-popover); }
    .toggle-btn.active { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>

<div style="position:relative; flex:1; min-width:0;">
  <div id="cesiumContainer"></div>
  <div class="coord-bar" id="coordBar">--</div>
  <div id="screenshotPreview">
    <img id="ssImg">
    <div class="bar">
      <span id="ssTime"></span>
      <div style="display:flex;gap:4px;">
        <button onclick="downloadScreenshot()">Download</button>
        <button onclick="closeScreenshot()">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">
    <h1>Cesium MCP <span>Demo</span></h1>
    <div class="header-actions">
      <span id="wsStatus" class="badge err" data-i18n="ws.offline">离线</span>
      <button class="toggle-btn" onclick="toggleLang()" id="langBtn" title="中/EN">文</button>
      <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Theme">&#9789;</button>
    </div>
  </div>

  <div class="panel-scroll">

    <!-- View -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.view">视图控制</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn" onclick="cmd('flyTo',{longitude:116.39,latitude:39.91,height:8000,duration:2})" data-i18n="city.beijing">北京</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:121.47,latitude:31.23,height:8000,duration:2})" data-i18n="city.shanghai">上海</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:113.26,latitude:23.13,height:8000,duration:2})" data-i18n="city.guangzhou">广州</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:104.07,latitude:30.67,height:8000,duration:2})" data-i18n="city.chengdu">成都</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:114.06,latitude:22.54,height:5000,duration:2})" data-i18n="city.shenzhen">深圳</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:106.55,latitude:29.56,height:8000,duration:2})" data-i18n="city.chongqing">重庆</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:120.15,latitude:30.28,height:8000,duration:2})" data-i18n="city.hangzhou">杭州</button>
          <button class="btn" onclick="cmd('flyTo',{longitude:108.94,latitude:34.26,height:8000,duration:2})" data-i18n="city.xian">西安</button>
        </div>
        <div class="btn-grid" style="margin-top:8px;">
          <button class="btn primary" onclick="cmd('getView',{})" data-i18n="btn.getView">获取视角</button>
          <button class="btn primary" onclick="cmd('screenshot',{})" data-i18n="btn.screenshot">截图</button>
        </div>
      </div>
    </div>

    <!-- Layers -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.geojson">GeoJSON 图层</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn primary" onclick="addCitiesLayer()" data-i18n="btn.chinaCities">中国主要城市</button>
          <button class="btn primary" onclick="addRandomPolygon()" data-i18n="btn.randomPoly">随机多边形</button>
          <button class="btn primary" onclick="addPolylineLayer()" data-i18n="btn.airline">航线图层</button>
        </div>
        <div class="btn-grid" style="margin-top:6px;">
          <button class="btn destructive" onclick="cmd('removeLayer',{id:'cities'})" data-i18n="btn.rmCities">- 城市</button>
          <button class="btn destructive" onclick="cmd('removeLayer',{id:'polygon1'})" data-i18n="btn.rmPoly">- 多边形</button>
          <button class="btn destructive" onclick="cmd('removeLayer',{id:'airline1'})" data-i18n="btn.rmAirline">- 航线</button>
        </div>
      </div>
    </div>

    <!-- Markers -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.markers">标注与实体</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn" onclick="addCityMarkers()" data-i18n="btn.cityLabels">城市标注</button>
          <button class="btn" onclick="cmd('addMarker',{id:'custom1',longitude:116.39,latitude:39.91,label:'天安门',color:'#ef4444'})" data-i18n="btn.tiananmen">天安门</button>
          <button class="btn" onclick="cmd('addMarker',{id:'custom2',longitude:121.49,latitude:31.24,label:'外滩',color:'#3b82f6'})" data-i18n="btn.bund">外滩</button>
        </div>
      </div>
    </div>

    <!-- Basemap -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.basemap">底图切换</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn" onclick="cmd('setBasemap',{type:'osm'})">OSM</button>
          <button class="btn" onclick="cmd('setBasemap',{type:'arcgis'})">ArcGIS</button>
          <button class="btn" onclick="cmd('setBasemap',{type:'tianditu_vec',token:'your_token'})" data-i18n="btn.tdtVec">天地图矢量</button>
          <button class="btn" onclick="cmd('setBasemap',{type:'tianditu_img',token:'your_token'})" data-i18n="btn.tdtImg">天地图影像</button>
        </div>
      </div>
    </div>

    <!-- Trajectory -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.trajectory">轨迹回放</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn primary" onclick="playBeijingToShanghai()" data-i18n="btn.bjsh">北京-上海轨迹</button>
          <button class="btn primary" onclick="playCircleTrajectory()" data-i18n="btn.circle">环形轨迹</button>
        </div>
      </div>
    </div>

    <!-- Heatmap -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.heatmap">热力图</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn primary" onclick="addHeatmap()" data-i18n="btn.popHeat">城市人口热力图</button>
          <button class="btn primary" onclick="addRandomHeatmap()" data-i18n="btn.randHeat">随机 200 点</button>
          <button class="btn destructive" onclick="cmd('removeLayer',{id:'heatmap1'})" data-i18n="btn.rmHeat">- 热力图</button>
        </div>
      </div>
    </div>

    <!-- 3D -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.3d">3D Tiles / 地形 / 影像</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn primary" onclick="load3dTilesDemo()" data-i18n="btn.3dBuildings">3D 建筑</button>
          <button class="btn primary" onclick="loadTerrainDemo()" data-i18n="btn.terrain">世界地形</button>
          <button class="btn primary" onclick="loadImageryDemo()">Sentinel-2</button>
          <button class="btn destructive" onclick="cmd('removeLayer',{id:'tiles-demo'})">- 3D Tiles</button>
        </div>
        <div class="hint" data-i18n="hint.3d">使用 Cesium Ion 示例数据 (96188, 1, 3954)</div>
      </div>
    </div>

    <!-- Style & Highlight -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.style">样式与高亮</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div class="btn-grid">
          <button class="btn" onclick="cmd('updateLayerStyle',{id:'cities',strokeColor:'#ef4444',fillColor:'#ef444480'})" data-i18n="btn.redStyle">红色样式</button>
          <button class="btn" onclick="cmd('updateLayerStyle',{id:'cities',strokeColor:'#10b981',fillColor:'#10b98180'})" data-i18n="btn.greenStyle">绿色样式</button>
          <button class="btn" onclick="cmd('highlight',{layerId:'cities',featureId:0,color:'#fbbf24'})" data-i18n="btn.hlFirst">高亮 #0</button>
          <button class="btn" onclick="cmd('highlight',{clear:true})" data-i18n="btn.clearHl">清除高亮</button>
        </div>
        <div class="hint" data-i18n="hint.style">需先添加城市图层</div>
      </div>
    </div>

    <!-- Layer Manager -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.layers">图层管理</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div id="layerList"><span style="font-size:12px;color:var(--fg-dim)" data-i18n="layer.empty">暂无图层</span></div>
        <div class="btn-grid" style="margin-top:8px;">
          <button class="btn" onclick="refreshLayers()" data-i18n="btn.refresh">刷新</button>
        </div>
      </div>
    </div>

    <!-- Custom Command -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.custom">自定义 JSON 命令</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <textarea id="customCmd" class="custom-textarea" spellcheck="false">{"action":"flyTo","params":{"longitude":116.39,"latitude":39.91,"height":5000}}</textarea>
        <button class="btn primary" style="margin-top:8px;" onclick="runCustomCmd()" data-i18n="btn.execute">执行</button>
      </div>
    </div>

    <!-- Log -->
    <div class="section">
      <div class="section-title" onclick="toggleSection(this)">
        <span data-i18n="sec.log">运行日志</span> <span class="arrow">&#9660;</span>
      </div>
      <div class="section-body">
        <div id="log"><span class="log-info" data-i18n="log.ready">就绪</span></div>
      </div>
    </div>

  </div>
</div>

  // ========== Bridge (降级模式 - 直接操作 Viewer) ==========
  const bridge = {
    _layers: {},

    async execute(command) {
      const { action, params } = command
      log(`exec: ${action}`, 'cmd')

      switch (action) {
        case 'flyTo':
          return new Promise(resolve => {
            viewer.camera.flyTo({
              destination: Cesium.Cartesian3.fromDegrees(params.longitude, params.latitude, params.height || 10000),
              duration: params.duration || 2,
              complete: () => resolve({ success: true })
            })
          })

        case 'setView':
          viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(params.longitude, params.latitude, params.height || 10000),
          })
          return { success: true }

        case 'getView': {
          const pos = viewer.camera.positionCartographic
          const result = {
            longitude: +Cesium.Math.toDegrees(pos.longitude).toFixed(6),
            latitude: +Cesium.Math.toDegrees(pos.latitude).toFixed(6),
            height: +pos.height.toFixed(1),
            heading: +Cesium.Math.toDegrees(viewer.camera.heading).toFixed(2),
            pitch: +Cesium.Math.toDegrees(viewer.camera.pitch).toFixed(2),
          }
          log('view: ' + JSON.stringify(result, null, 2), 'ok')
          return result
        }

        case 'screenshot': {
          viewer.render()
          const dataUrl = viewer.canvas.toDataURL('image/png')
          showScreenshot(dataUrl)
          log('screenshot captured', 'ok')
          return { dataUrl }
        }

        case 'addGeoJsonLayer': {
          const ds = await Cesium.GeoJsonDataSource.load(params.data, {
            stroke: Cesium.Color.fromCssColorString(params.strokeColor || '#3b82f6'),
            strokeWidth: params.strokeWidth || 2,
            fill: Cesium.Color.fromCssColorString(params.fillColor || '#3b82f680'),
            markerSize: params.markerSize || 24,
            markerColor: Cesium.Color.fromCssColorString(params.markerColor || '#ef4444'),
            clampToGround: params.clampToGround !== false,
          })
          ds.name = params.id
          viewer.dataSources.add(ds)
          this._layers[params.id] = { type: 'geojson', dataSource: ds }
          log(`layer [${params.id}] added`, 'ok')
          refreshLayers()
          return { success: true, layerId: params.id }
        }

        case 'addMarker': {
          const entity = viewer.entities.add({
            id: params.id,
            position: Cesium.Cartesian3.fromDegrees(params.longitude, params.latitude, params.height || 0),
            point: { pixelSize: 12, color: Cesium.Color.fromCssColorString(params.color || '#ef4444'), outlineColor: Cesium.Color.WHITE, outlineWidth: 2, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
            label: params.label ? {
              text: params.label,
              font: '13px sans-serif',
              style: Cesium.LabelStyle.FILL_AND_OUTLINE,
              outlineWidth: 2,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              pixelOffset: new Cesium.Cartesian2(0, -16),
              heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
            } : undefined,
          })
          this._layers[params.id] = { type: 'marker', entity }
          log(`marker [${params.id}] ${params.label || ''} added`, 'ok')
          refreshLayers()
          return { success: true }
        }

        case 'addLabels': {
          const ds = new Cesium.CustomDataSource(params.id || 'labels')
          for (const item of (params.labels || [])) {
            ds.entities.add({
              position: Cesium.Cartesian3.fromDegrees(item.longitude, item.latitude),
              label: { text: item.text, font: '13px sans-serif', style: Cesium.LabelStyle.FILL_AND_OUTLINE, outlineWidth: 2, heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
              point: { pixelSize: 8, color: Cesium.Color.fromCssColorString(item.color || '#3b82f6'), heightReference: Cesium.HeightReference.CLAMP_TO_GROUND },
            })
          }
          viewer.dataSources.add(ds)
          this._layers[params.id] = { type: 'labels', dataSource: ds }
          log(`labels [${params.id}] ${params.labels?.length || 0} items`, 'ok')
          refreshLayers()
          return { success: true }
        }

        case 'removeLayer': {
          const layer = this._layers[params.id]
          if (layer) {
            if (layer.dataSource) viewer.dataSources.remove(layer.dataSource, true)
            if (layer.entity) viewer.entities.remove(layer.entity)
            if (layer.imageryLayer) viewer.imageryLayers.remove(layer.imageryLayer, true)
            if (layer.primitive) viewer.scene.primitives.remove(layer.primitive)
            delete this._layers[params.id]
            log(`layer [${params.id}] removed`, 'ok')
            refreshLayers()
          } else {
            log(`layer [${params.id}] not found`, 'err')
          }
          return { success: true }
        }

        case 'setBasemap': {
          const layers = viewer.imageryLayers
          if (layers.length > 0) layers.remove(layers.get(0))
          let provider
          if (params.type === 'osm') {
            provider = new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
          } else if (params.type === 'arcgis') {
            provider = await Cesium.ArcGisMapServerImageryProvider.fromUrl('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer')
          } else {
            provider = new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })
          }
          layers.addImageryProvider(provider, 0)
          log(`basemap: ${params.type}`, 'ok')
          return { success: true }
        }

        case 'setLayerVisibility': {
          const layer = this._layers[params.id]
          if (layer?.dataSource) layer.dataSource.show = params.visible !== false
          if (layer?.entity) layer.entity.show = params.visible !== false
          log(`layer [${params.id}] visible: ${params.visible}`, 'ok')
          return { success: true }
        }

        case 'listLayers': {
          const list = Object.entries(this._layers).map(([id, l]) => ({ id, type: l.type }))
          log('layers: ' + JSON.stringify(list), 'ok')
          return { layers: list }
        }

        case 'playTrajectory': {
          const points = params.points || []
          if (points.length < 2) return { success: false, error: 'Need >= 2 points' }

          // 绘制路线
          const positions = points.map(p => Cesium.Cartesian3.fromDegrees(p.longitude, p.latitude, p.height || 0))
          const lineEntity = viewer.entities.add({
            polyline: {
              positions,
              width: 3,
              material: new Cesium.PolylineGlowMaterialProperty({ glowPower: 0.2, color: Cesium.Color.fromCssColorString(params.color || '#3b82f6') }),
              clampToGround: true,
            }
          })

          // 移动点
          let idx = 0
          const dot = viewer.entities.add({
            position: positions[0],
            point: { pixelSize: 14, color: Cesium.Color.fromCssColorString(params.color || '#ef4444'), outlineColor: Cesium.Color.WHITE, outlineWidth: 2 }
          })

          const speed = params.speed || 100 // ms per segment
          const interval = setInterval(() => {
            idx++
            if (idx >= positions.length) {
              clearInterval(interval)
              viewer.entities.remove(dot)
              log('trajectory complete', 'ok')
              return
            }
            dot.position = positions[idx]
          }, speed)

          this._layers[params.id || 'trajectory'] = { type: 'trajectory', entity: lineEntity }
          log(`trajectory [${params.id}] playing (${points.length} pts)`, 'ok')
          refreshLayers()
          return { success: true }
        }

        case 'zoomToExtent':
          viewer.camera.flyTo({
            destination: Cesium.Rectangle.fromDegrees(params.west, params.south, params.east, params.north),
            duration: params.duration || 2,
          })
          return { success: true }

        case 'addHeatmap': {
          // 使用 primitive 模拟热力图 - 用半透明圆圈叠加
          const ds = new Cesium.CustomDataSource(params.id || 'heatmap')
          const features = params.data?.features || []
          const radius = params.radius || 40
          for (const f of features) {
            const [lon, lat] = f.geometry.coordinates
            const w = f.properties?.weight || 0.5
            const r = Math.floor(255 * Math.min(1, w * 2))
            const g = Math.floor(255 * Math.max(0, 1 - w * 2))
            ds.entities.add({
              position: Cesium.Cartesian3.fromDegrees(lon, lat),
              ellipse: {
                semiMinorAxis: radius * 1000 * w,
                semiMajorAxis: radius * 1000 * w,
                material: new Cesium.ColorMaterialProperty(new Cesium.Color(r / 255, g / 255, 0, 0.4 * w + 0.1)),
                heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
              },
            })
          }
          viewer.dataSources.add(ds)
          this._layers[params.id] = { type: 'heatmap', dataSource: ds }
          log(`heatmap [${params.id}] ${features.length} pts`, 'ok')
          refreshLayers()
          return { success: true }
        }

        case 'load3dTiles': {
          try {
            const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(params.assetId || params.ionAssetId || 96188)
            viewer.scene.primitives.add(tileset)
            this._layers[params.id || 'tiles'] = { type: '3dtiles', primitive: tileset }
            log(`3D Tiles [${params.id}] asset ${params.assetId || params.ionAssetId} loaded`, 'ok')
            refreshLayers()
            return { success: true }
          } catch (e) {
            log(`3D Tiles failed: ${e.message}`, 'err')
            return { success: false, error: e.message }
          }
        }

        case 'loadTerrain': {
          try {
            viewer.scene.setTerrain(new Cesium.Terrain(Cesium.CesiumTerrainProvider.fromIonAssetId(params.ionAssetId || 1)))
            log(`terrain loaded (Ion asset ${params.ionAssetId || 1})`, 'ok')
            return { success: true }
          } catch (e) {
            log(`terrain failed: ${e.message}`, 'err')
            return { success: false, error: e.message }
          }
        }

        case 'loadImageryService': {
          try {
            const provider = await Cesium.IonImageryProvider.fromAssetId(params.ionAssetId || 3954)
            const layer = viewer.imageryLayers.addImageryProvider(provider)
            layer.alpha = params.alpha || 1.0
            this._layers[params.id || 'imagery'] = { type: 'imagery', imageryLayer: layer }
            log(`imagery [${params.id}] loaded`, 'ok')
            refreshLayers()
            return { success: true }
          } catch (e) {
            log(`imagery failed: ${e.message}`, 'err')
            return { success: false, error: e.message }
          }
        }

        case 'updateLayerStyle': {
          const layer = this._layers[params.id]
          if (!layer?.dataSource) {
            log(`layer [${params.id}] no dataSource, cannot update style`, 'err')
            return { success: false }
          }
          const entities = layer.dataSource.entities.values
          for (const entity of entities) {
            if (entity.point) {
              if (params.markerColor) entity.point.color = Cesium.Color.fromCssColorString(params.markerColor)
              if (params.markerSize) entity.point.pixelSize = params.markerSize
            }
            if (entity.polygon) {
              if (params.fillColor) entity.polygon.material = Cesium.Color.fromCssColorString(params.fillColor)
              if (params.strokeColor) entity.polygon.outlineColor = Cesium.Color.fromCssColorString(params.strokeColor)
            }
            if (entity.polyline) {
              if (params.strokeColor) entity.polyline.material = Cesium.Color.fromCssColorString(params.strokeColor)
              if (params.strokeWidth) entity.polyline.width = params.strokeWidth
            }
          }
          log(`layer [${params.id}] style updated`, 'ok')
          return { success: true }
        }

        case 'highlight': {
          // 清除之前的高亮
          if (this._highlightRestore) {
            this._highlightRestore()
            this._highlightRestore = null
          }
          if (params.clear) {
            log('highlight cleared', 'ok')
            return { success: true }
          }
          const layer = this._layers[params.layerId]
          if (!layer?.dataSource) {
            log(`layer [${params.layerId}] not found`, 'err')
            return { success: false }
          }
          const entities = layer.dataSource.entities.values
          const idx = params.featureId || 0
          if (idx >= entities.length) {
            log(`feature index ${idx} out of range`, 'err')
            return { success: false }
          }
          const target = entities[idx]
          const hlColor = Cesium.Color.fromCssColorString(params.color || '#fbbf24')
          // 保存原始状态
          let origColor = null
          if (target.point) {
            origColor = target.point.color?.getValue(Cesium.JulianDate.now())
            target.point.color = hlColor
            target.point.pixelSize = (target.point.pixelSize?.getValue(Cesium.JulianDate.now()) || 12) * 2
            const origSize = (target.point.pixelSize?.getValue(Cesium.JulianDate.now()) || 24) / 2
            this._highlightRestore = () => {
              target.point.color = origColor || Cesium.Color.RED
              target.point.pixelSize = origSize
            }
          }
          log(`highlight [${params.layerId}] feature #${idx}`, 'ok')
          return { success: true }
        }

        default:
          log(`unknown: ${action}`, 'err')
          return { success: false, error: `Unknown action: ${action}` }
      }
    }
  }

  // ========== WebSocket ==========
  let ws = null

  function connectRuntime() {
    const el = document.getElementById('wsStatus')
    try { ws = new WebSocket(`${RUNTIME_WS_URL}?session=${SESSION_ID}`) } catch (e) {
      el.textContent = t('ws.failed'); el.className = 'badge err'; el.setAttribute('data-i18n','ws.failed'); return
    }
    ws.onopen = () => { el.textContent = t('ws.online'); el.className = 'badge ok'; el.setAttribute('data-i18n','ws.online'); log('Runtime connected', 'ok') }
    ws.onmessage = async (event) => {
      const msg = JSON.parse(event.data)
      log(`remote: ${msg.method}`, 'cmd')
      const result = await bridge.execute({ action: msg.method, params: msg.params || {} })
      if (msg.id) ws.send(JSON.stringify({ id: msg.id, result: result || { success: true } }))
    }
    ws.onclose = () => { el.textContent = t('ws.offline'); el.className = 'badge err'; el.setAttribute('data-i18n','ws.offline'); log('disconnected, reconnect in 5s...', 'err'); setTimeout(connectRuntime, 5000) }
    ws.onerror = () => { el.textContent = t('ws.error'); el.className = 'badge err'; el.setAttribute('data-i18n','ws.error') }
  }
  connectRuntime()

  // ========== 图层列表 ==========
  function refreshLayers() {
    const el = document.getElementById('layerList')
    const entries = Object.entries(bridge._layers)
    if (entries.length === 0) {
      el.innerHTML = `<span style="font-size:12px;color:var(--fg-dim)" data-i18n="layer.empty">${t('layer.empty')}</span>`
      return
    }
    const typeColors = { geojson: '#3b82f6', marker: '#ef4444', labels: '#f59e0b', trajectory: '#a855f7', imagery: '#10b981', heatmap: '#ec4899', '3dtiles': '#06b6d4' }
    el.innerHTML = entries.map(([id, l]) => `
      <div class="layer-item">
        <span class="dot" style="background:${typeColors[l.type] || '#6b7280'}"></span>
        <span style="flex:1">${id}</span>
        <span class="layer-type">${l.type}</span>
        <button class="btn destructive" style="padding:2px 6px;font-size:10px;" onclick="cmd('removeLayer',{id:'${id}'})">x</button>
      </div>
    `).join('')
  }

  // ========== 自定义命令 ==========
  function runCustomCmd() {
    try {
      const data = JSON.parse(document.getElementById('customCmd').value)
      cmd(data.action, data.params || {})
    } catch (e) {
      log('JSON parse error: ' + e.message, 'err')
    }
  }

  // ========== 截图 ==========
  let lastScreenshotUrl = ''
  function showScreenshot(dataUrl) {
    lastScreenshotUrl = dataUrl
    document.getElementById('ssImg').src = dataUrl
    document.getElementById('ssTime').textContent = new Date().toLocaleTimeString()
    document.getElementById('screenshotPreview').style.display = 'block'
  }
  function closeScreenshot() { document.getElementById('screenshotPreview').style.display = 'none' }
  function downloadScreenshot() {
    const a = document.createElement('a')
    a.href = lastScreenshotUrl
    a.download = `cesium-screenshot-${Date.now()}.png`
    a.click()
  }

  // ========== UI 工具 ==========
  function toggleSection(el) { el.parentElement.classList.toggle('collapsed') }

  function log(msg, type = 'info') {
    const el = document.getElementById('log')
    const ts = new Date().toLocaleTimeString()
    const cls = { cmd: 'log-cmd', ok: 'log-ok', err: 'log-err', info: 'log-info' }[type] || 'log-info'
    const line = document.createElement('div')
    line.innerHTML = `<span class="log-time">[${ts}]</span> <span class="${cls}">${msg}</span>`
    el.insertBefore(line, el.firstChild)
    // 最多保留 100 条
    while (el.children.length > 100) el.removeChild(el.lastChild)
  }
</script>

</body>
</html>
