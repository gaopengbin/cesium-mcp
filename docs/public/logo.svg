<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Globe gradient -->
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="50%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </radialGradient>
    <!-- Globe shadow -->
    <radialGradient id="globeShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#0277BD" stop-opacity="0"/>
      <stop offset="100%" stop-color="#01579B" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0288D1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Node glow -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </radialGradient>
    <!-- Highlight -->
    <linearGradient id="highlight" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Globe body -->
  <circle cx="128" cy="128" r="72" fill="url(#globeGrad)"/>
  <circle cx="128" cy="128" r="72" fill="url(#globeShadow)"/>

  <!-- Continental shapes (abstract land masses) -->
  <g opacity="0.2" fill="white">
    <!-- Eurasia-like shape -->
    <path d="M108,82 Q118,78 130,80 Q142,82 150,90 Q156,96 152,104 Q148,108 140,106 Q134,104 128,100 Q120,96 112,92 Q106,88 108,82Z"/>
    <!-- Africa-like shape -->
    <path d="M116,112 Q120,108 126,110 Q132,114 134,122 Q136,132 132,140 Q128,146 122,144 Q118,140 116,132 Q114,122 116,112Z"/>
    <!-- Americas-like shape -->
    <path d="M86,96 Q90,90 96,92 Q100,96 98,104 Q96,112 92,118 Q88,122 84,118 Q80,112 82,104 Q84,98 86,96Z"/>
    <!-- Australia-like shape -->
    <path d="M148,140 Q154,136 160,138 Q164,142 162,148 Q158,152 152,150 Q148,146 148,140Z"/>
  </g>

  <!-- Globe grid - latitude lines -->
  <g fill="none" stroke="white" stroke-width="0.8" opacity="0.18">
    <ellipse cx="128" cy="128" rx="72" ry="18"/>
    <ellipse cx="128" cy="128" rx="72" ry="36"/>
    <ellipse cx="128" cy="128" rx="72" ry="54"/>
  </g>

  <!-- Globe grid - longitude lines -->
  <g fill="none" stroke="white" stroke-width="0.8" opacity="0.18">
    <ellipse cx="128" cy="128" rx="18" ry="72"/>
    <ellipse cx="128" cy="128" rx="36" ry="72"/>
    <ellipse cx="128" cy="128" rx="54" ry="72"/>
  </g>

  <!-- Globe highlight (specular) -->
  <ellipse cx="108" cy="100" rx="30" ry="24" fill="url(#highlight)"/>

  <!-- Orbital ring 1 (tilted, main MCP channel) -->
  <ellipse cx="128" cy="128" rx="100" ry="28" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"
    transform="rotate(-25, 128, 128)"/>

  <!-- Orbital ring 2 (secondary) -->
  <ellipse cx="128" cy="128" rx="96" ry="20" fill="none" stroke="#4FC3F7" stroke-width="1.2" opacity="0.3"
    transform="rotate(15, 128, 128)"/>

  <!-- MCP tool nodes on ring 1 -->
  <g transform="rotate(-25, 128, 128)">
    <!-- Node 1 - top right -->
    <circle cx="218" cy="104" r="7" fill="url(#nodeGlow)"/>
    <circle cx="218" cy="104" r="3.5" fill="white" opacity="0.9"/>
    <!-- Node 2 - left -->
    <circle cx="38" cy="152" r="6" fill="url(#nodeGlow)"/>
    <circle cx="38" cy="152" r="3" fill="white" opacity="0.9"/>
    <!-- Node 3 - bottom -->
    <circle cx="160" cy="155" r="5" fill="url(#nodeGlow)"/>
    <circle cx="160" cy="155" r="2.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Data pulse lines (from nodes toward globe) -->
  <g stroke="#4FC3F7" stroke-width="1" opacity="0.4">
    <line x1="210" y1="96" x2="178" y2="106" stroke-dasharray="4 3"/>
    <line x1="52" y1="156" x2="76" y2="146" stroke-dasharray="4 3"/>
  </g>

  <!-- Center AI indicator -->
  <circle cx="128" cy="128" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="128" cy="128" r="3" fill="white" opacity="0.7"/>
</svg>
