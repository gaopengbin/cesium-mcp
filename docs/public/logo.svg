<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7"/>
      <stop offset="100%" style="stop-color:#0288D1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043"/>
      <stop offset="100%" style="stop-color:#F4511E"/>
    </linearGradient>
  </defs>
  <!-- Globe -->
  <circle cx="64" cy="64" r="40" fill="url(#globe)" opacity="0.9"/>
  <!-- Globe lines -->
  <ellipse cx="64" cy="64" rx="40" ry="16" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="64" cy="64" rx="16" ry="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="24" y1="64" x2="104" y2="64" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="24" x2="64" y2="104" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- MCP ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="url(#ring)" stroke-width="3" stroke-dasharray="12 6" opacity="0.8"/>
  <!-- AI sparkle -->
  <circle cx="96" cy="32" r="6" fill="#FFD54F" opacity="0.9"/>
  <line x1="96" y1="24" x2="96" y2="40" stroke="#FFD54F" stroke-width="1.5" opacity="0.6"/>
  <line x1="88" y1="32" x2="104" y2="32" stroke="#FFD54F" stroke-width="1.5" opacity="0.6"/>
</svg>
