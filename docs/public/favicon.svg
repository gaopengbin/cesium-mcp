<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="g" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="50%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </radialGradient>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <!-- Globe -->
  <circle cx="16" cy="16" r="11" fill="url(#g)"/>
  <!-- Grid -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="16" cy="16" rx="4" ry="11" fill="none" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <!-- Orbital ring -->
  <ellipse cx="16" cy="16" rx="15" ry="5" fill="none" stroke="url(#r)" stroke-width="1.5"
    transform="rotate(-25, 16, 16)"/>
  <!-- Nodes -->
  <circle cx="30" cy="12" r="2" fill="#B3E5FC" transform="rotate(-25, 16, 16)"/>
  <circle cx="2" cy="20" r="1.5" fill="#B3E5FC" transform="rotate(-25, 16, 16)"/>
</svg>
